server {
    listen 80;
    listen [::]:80;
    server_name socialreviewcard.com www.socialreviewcard.com;

    # React build output (run `npm run build` in frontend/ -> dist/)
    root /home/ubuntu/socialreviewcard/frontend/dist;
    index index.html;

    # API + Stripe webhook -> .NET backend on localhost:5080
    location /api/ {
        proxy_pass http://127.0.0.1:5080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Stripe signature check needs the raw body untouched:
        proxy_request_buffering off;
    }

    # SPA fallback: every non-file route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
