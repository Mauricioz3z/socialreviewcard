<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons (favicon.io set, in public/favicon_io) -->
    <link rel="icon" type="image/x-icon" href="/favicon_io/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon_io/site.webmanifest" />

    <title>SocialReviewCard — Turn customer reviews into shareable images</title>
    <meta
      name="description"
      content="Paste a screenshot of any customer review — AI extracts the text, name and stars — and export a beautiful, shareable image for Instagram, Etsy, Shopify and more. Free to start."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#6d5efc" />
    <link rel="canonical" href="https://socialreviewcard.com/" />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://socialreviewcard.com/" />
    <meta property="og:title" content="SocialReviewCard — Turn customer reviews into shareable images" />
    <meta
      property="og:description"
      content="Paste a screenshot of any customer review — AI extracts the text, name and stars — and export a beautiful, shareable image in seconds."
    />
    <meta property="og:image" content="https://socialreviewcard.com/og-cover.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SocialReviewCard — Turn customer reviews into shareable images" />
    <meta
      name="twitter:description"
      content="Paste a screenshot of any customer review — AI turns it into a beautiful, shareable image in seconds."
    />
    <meta name="twitter:image" content="https://socialreviewcard.com/og-cover.png" />

    <!-- Structured data for rich results -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "SocialReviewCard",
        "url": "https://socialreviewcard.com/",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Web",
        "description": "Paste a screenshot of any customer review and AI turns it into a beautiful, shareable image for Instagram, Etsy, Shopify and more.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is SocialReviewCard?",
            "acceptedAnswer": { "@type": "Answer", "text": "SocialReviewCard is a free online tool that turns customer reviews and testimonials into beautiful, shareable images for social media, your store and marketing." }
          },
          {
            "@type": "Question",
            "name": "Which platforms is it for?",
            "acceptedAnswer": { "@type": "Answer", "text": "It works great for Etsy, Shopify, Amazon, Instagram, Google Reviews, TikTok Shop and any business that wants to showcase customer feedback as eye-catching graphics." }
          },
          {
            "@type": "Question",
            "name": "Do I need design skills?",
            "acceptedAnswer": { "@type": "Answer", "text": "No. Paste your review, pick a template and background, and export. The live preview shows exactly what you will get." }
          },
          {
            "@type": "Question",
            "name": "Is it free?",
            "acceptedAnswer": { "@type": "Answer", "text": "Yes — you can create and export images for free. A Pro plan removes the watermark and unlocks unlimited high-resolution exports." }
          }
        ]
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
